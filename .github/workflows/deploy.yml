name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Type Safety Checks (Security & Integrity)
        run: npm run check

      - name: Build Nuxt app
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            export NUXT_PUBLIC_REALTIME_ENABLED="true"
            export NUXT_PUBLIC_PARTYKIT_HOST="habits-social-realtime-production.ieatcode4breakfast.partykit.dev"
          else
            export NUXT_PUBLIC_REALTIME_ENABLED="true"
            export NUXT_PUBLIC_PARTYKIT_HOST="habits-social-realtime-staging.ieatcode4breakfast.partykit.dev"
          fi
          npm run build
          grep -q "connect-src 'self' https://${NUXT_PUBLIC_PARTYKIT_HOST} wss://${NUXT_PUBLIC_PARTYKIT_HOST}" .output/public/_headers

      - name: Check Database Migrations
        run: npx drizzle-kit check

      - name: Run Database Migrations
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            export DATABASE_URL="${{ secrets.PRODUCTION_DATABASE_URL }}"
          else
            export DATABASE_URL="${{ secrets.STAGING_DATABASE_URL }}"
          fi
          npx drizzle-kit migrate

      - name: Deploy to Cloudflare Workers
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            npx wrangler@latest deploy --env production
          else
            npx wrangler@latest deploy
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
