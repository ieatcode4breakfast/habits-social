name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Nuxt app
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PUSHER_APP_ID: ${{ secrets.PUSHER_APP_ID }}
          PUSHER_KEY: ${{ secrets.PUSHER_KEY }}
          PUSHER_SECRET: ${{ secrets.PUSHER_SECRET }}
          PUSHER_CLUSTER: ${{ secrets.PUSHER_CLUSTER }}

      - name: Deploy to Cloudflare Workers
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            # Teleport secrets from GitHub to Cloudflare
            echo "${{ secrets.PUSHER_APP_ID }}" | npx wrangler secret put PUSHER_APP_ID --env production
            echo "${{ secrets.PUSHER_KEY }}" | npx wrangler secret put PUSHER_KEY --env production
            echo "${{ secrets.PUSHER_SECRET }}" | npx wrangler secret put PUSHER_SECRET --env production
            echo "${{ secrets.PUSHER_CLUSTER }}" | npx wrangler secret put PUSHER_CLUSTER --env production
            
            npx wrangler@latest deploy --env production
          else
            npx wrangler@latest deploy
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
