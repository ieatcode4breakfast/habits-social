name = "habits-social-staging"
main = ".output/server/index.mjs"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[env.production]
name = "habits-social-live"
routes = [
  { pattern = "habitssocial.com", custom_domain = true },
  { pattern = "www.habitssocial.com", custom_domain = true }
]

[env.production.vars]
# Production environment variables (public)
NODE_ENV = "production"
NUXT_PUBLIC_REALTIME_ENABLED = "false"
NUXT_PUBLIC_PARTYKIT_HOST = ""



[assets]
directory = ".output/public"
binding = "ASSETS"

[observability.logs]
enabled = true
invocation_logs = true

[vars]
NUXT_PUBLIC_REALTIME_ENABLED = "false"
NUXT_PUBLIC_PARTYKIT_HOST = ""
# DATABASE_URL = "your_connection_string_here"
# Note: For production, use 'wrangler secret put DATABASE_URL' instead.
