name = "habits-social-staging"
main = ".output/server/index.mjs"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[env.production]
name = "habits-social-live"
routes = [
  { pattern = "habitssocial.com", custom_domain = true },
  { pattern = "www.habitssocial.com", custom_domain = true }
]

[env.production.vars]
# Production environment variables (public)
NODE_ENV = "production"

[[kv_namespaces]]
binding = "AUTH_KV"
id = "da1a5af94cbc47acbda4f1b214b1b134"

[[env.production.kv_namespaces]]
binding = "AUTH_KV"
id = "4a137eebd4fc44c1b123385a64c242c9"

[assets]
directory = ".output/public"
binding = "ASSETS"

[observability.logs]
enabled = true
invocation_logs = true

[vars]
# DATABASE_URL = "your_connection_string_here"
# Note: For production, use 'wrangler secret put DATABASE_URL' instead.
